# base.yaml – shared params for ALL methods
# DO NOT change after first training run

model:
  name: Qwen/Qwen2.5-7B-Instruct
  flash_attn: true          # uses flash_attention_2

lora:
  r: 128
  alpha: 256
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  optimizer: adamw_torch
  lr: 5.0e-5
  scheduler: cosine
  warmup_ratio: 0.05
  epochs: 25
  batch_per_device: 1
  grad_accum: 16
  weight_decay: 0.01
  max_grad_norm: 1.0
  max_length: 2048

data:
  amr1_weight: 1
  amr2_weight: 3
  syn_weight: 10

seeds: [42, 123, 456]
